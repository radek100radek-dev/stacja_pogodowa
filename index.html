<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel Inżynierski IoT</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>Stacja pogodowa</h1>

<div class="grid">
    <div class="card">
        <span>Temperatura</span>
        <span id="v1" class="value">--</span>
        <span>°C</span>
    </div>
    <div class="card">
        <span>Wilgotność</span>
        <span id="v2" class="value">--</span>
        <span>%</span>
    </div>
    <div class="card">
        <span>Ciśnienie</span>
        <span id="v3" class="value">--</span>
        <span>hPa</span>
    </div>
</div>

<div class="chart-container"><canvas id="tempChart"></canvas></div>
<div class="chart-container"><canvas id="humChart"></canvas></div>
<div class="chart-container"><canvas id="presChart"></canvas></div>

<script src="script.js"></script>
</body>
</html>
