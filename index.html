<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel Inżynierski IoT</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; text-align: center; }
        .grid { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; border-top: 4px solid #00d4ff; min-width: 200px; }
        .value { font-size: 2.5rem; font-weight: bold; display: block; }
        .chart-container { background: #1e1e1e; padding: 20px; border-radius: 10px; margin: 20px auto; max-width: 900px; height: 300px; }
    </style>
</head>
<body>

    <h1>Stacja pogodowa</h1>

    <div class="grid">
        <div class="card"><span>Temperatura</span><span id="v1" class="value">--</span><span>°C</span></div>
        <div class="card"><span>Wilgotność</span><span id="v2" class="value">--</span><span>%</span></div>
        <div class="card"><span>Ciśnienie</span><span id="v3" class="value">--</span><span>hPa</span></div>
    </div>

    <div class="chart-container"><canvas id="tempChart"></canvas></div>
    <div class="chart-container"><canvas id="humChart"></canvas></div>
    <div class="chart-container"><canvas id="presChart"></canvas></div>

    <script>
        const AUTH_TOKEN = "FoXVEcbaCus_0fAmltqrnqL9glcETGC3";
        const PINS = ["V1", "V2", "V3"];
        let lastValues = { V1: null, V2: null, V3: null };

        function initChart(id, label, color) {
            return new Chart(document.getElementById(id), {
                type: 'line',
                data: { labels: [], datasets: [{ label: label, data: [], borderColor: color, tension: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { grace: '5%' } } }
            });
        }

        const tempChart = initChart('tempChart', 'Temperatura', '#ff4d4d');
        const humChart = initChart('humChart', 'Wilgotność', '#00d4ff');
        const presChart = initChart('presChart', 'Ciśnienie', '#44ff44');

        async function update() {
            for (let pin of PINS) {
                try {
                    const res = await fetch(`https://blynk.cloud/external/api/get?token=${AUTH_TOKEN}&${pin}`);
                    const val = parseFloat(await res.text());

                    if (!isNaN(val) && val !== 0) {
                        const rounded = Math.round(val);
                        document.getElementById(pin.toLowerCase()).innerText = rounded;

                        // Dodaj do wykresu TYLKO jeśli wartość się zmieniła (nowa średnia)
                        if (rounded !== lastValues[pin]) {
                            lastValues[pin] = rounded;
                            const chart = pin==="V1" ? tempChart : pin==="V2" ? humChart : presChart;
                            chart.data.labels.push(new Date().toLocaleTimeString());
                            chart.data.datasets[0].data.push(rounded);
                            if (chart.data.labels.length > 30) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
                            chart.update();
                        }
                    }
                } catch (e) { console.error(e); }
            }
        }

        setInterval(update, 5000); // Sprawdzaj API co 5 sek
        update();
    </script>
</body>
</html>
